# fly.toml app configuration file generated for bastion-agentique on 2026-06-07T18:03:50Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bastion-agentique'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  BASTION_AGENT_STORE_PATH = '/data/bastion/agent_store'
  HELIUS_RPC_URL = 'https://devnet.helius-rpc.com/'
  SOLANA_RPC_URL = 'https://api.devnet.solana.com'

[[mounts]]
  source = 'bastion_data'
  destination = '/data/bastion'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '10s'
    timeout = '2s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
